<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Ксюши ❤️</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI', Arial, sans-serif;
    text-align:center;
    background:
        radial-gradient(circle at top left, #ffd6e8, transparent 40%),
        radial-gradient(circle at top right, #d9ccff, transparent 40%),
        linear-gradient(135deg, #fff1f6, #f4efff, #fff8e8);
}

.app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

#intro{
    background:rgba(255,255,255,0.8);
    border-radius:30px;
    padding:25px;
    max-width:450px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    margin-bottom:20px;
}

h1{margin:20px 0;}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:170px;
    height:230px;
    background:white;
    border-radius:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    max-width:120px;
    margin-bottom:10px;
}

.opened{
    flex-direction:column;
    font-size:18px;
}

.selectedCard{
    border:4px solid #ff7aa8;
}

button{
    margin-top:30px;
    padding:14px 40px;
    border:none;
    border-radius:999px;
    font-size:18px;
    background:#ff7aa8;
    color:white;
    cursor:pointer;
}

.hidden{display:none;}

.confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{transform:translateY(110vh);opacity:0;}
}
</style>
</head>

<body>

<div class="app">

<div id="intro">
<h2>Привет, Ксюша ❤️</h2>
<p>Сначала пройди 50/50 😄</p>
</div>

<h1 id="title">Нажми далее</h1>
<div class="cards" id="cards"></div>
<button id="btn" onclick="next()">Далее</button>

</div>

<script>
let step=0, selected=false, val="", gameOver=false;

let result={};

const chance=[
 {text:"Проходишь дальше",good:true},
 {text:"Сегодня без мака 😭",good:false}
];

const burgers=[
 {text:"Биг Хит",img:"bighit.jpg"},
 {text:"Чикен Премьер",img:"chicken.png"},
 {text:"Гранд Де Люкс",img:"grand.jpg"}
];

const yesNo=["Да","Нет"];
const sizes=["Маленькая","Средняя"];

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function render(data){
 selected=false; val="";
 let box=document.getElementById("cards");
 box.innerHTML="";
 let arr=shuffle(data);

 arr.forEach(item=>{
  let card=document.createElement("div");
  card.className="card";
  card.textContent="?";

  card.onclick=()=>{
   if(selected)return;
   selected=true;
   val=item.text||item;

   document.querySelectorAll(".card").forEach((c,i)=>{
    let el=arr[i];
    if(el.img){
     c.innerHTML=`<img src="${el.img}"><div>${el.text}</div>`;
    }else{
     c.innerHTML=el.text||el;
    }
    c.classList.add("opened");
   });

   card.classList.add("selectedCard");
  };

  box.appendChild(card);
 });
}

function next(){

 if(gameOver){restart();return;}

 if(step===0){
  document.getElementById("intro").classList.add("hidden");
  step=1;
  document.getElementById("title").textContent="50/50 😈";
  render(chance);
  return;
 }

 if(!selected)return alert("Выбери 😄");

 if(step===1){
  if(val.includes("без")){
   gameOver=true;
   document.getElementById("title").textContent="К сожалению сегодня без мака 😭";
   document.getElementById("cards").innerHTML="";
   document.getElementById("btn").textContent="Заново";
   return;
  }
  step=2;
  document.getElementById("title").textContent="Выбираем бургер 🍔";
  render(burgers);
 }

 else if(step===2){
  result.burger=val;
  step=3;
  document.getElementById("title").textContent="Картошка? 🍟";
  render(yesNo);
 }

 else if(step===3){
  if(val==="Да"){
   step=4;
   document.getElementById("title").textContent="Размер?";
   render(sizes);
  }else{
   result.potato="Нет";
   step=5;
   document.getElementById("title").textContent="Нагетсы? 🐔";
   render(yesNo);
  }
 }

 else if(step===4){
  result.potato=val;
  step=5;
  document.getElementById("title").textContent="Нагетсы? 🐔";
  render(yesNo);
 }

 else if(step===5){
  result.nuggets=val;
  step=6;

  document.getElementById("title").innerHTML=`
  ТВОЙ ЗАКАЗ ❤️<br><br>
  🍔 ${result.burger}<br>
  🍟 ${result.potato}<br>
  🐔 ${result.nuggets}
  `;

  document.getElementById("cards").innerHTML="";
  document.getElementById("btn").textContent="Заново";
  confetti();
 }

 else restart();
}

function restart(){
 location.reload();
}

function confetti(){
 for(let i=0;i<80;i++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"vw";
  c.style.background=["pink","yellow","violet"][Math.floor(Math.random()*3)];
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3000);
 }
}
</script>

</body>
</html>
